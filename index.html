<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>PrimeDocs</title>

    <meta id="themeColorMeta" name="theme-color" content="#6D5DFD">

    <meta
        name="description"
        content="Sistema de gestão para impressão 3D e consignado.">

    <meta name="application-name" content="PrimeDocs">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PrimeDocs">

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/brand.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <script>
        try {
            const tema = localStorage.getItem("primedocs_tema");
            const escuro = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
            document.documentElement.dataset.theme = tema || (escuro ? "dark" : "light");
        } catch (erro) {
            document.documentElement.dataset.theme = "light";
        }
    </script>

    <link rel="stylesheet" href="css/style.css?v=12">

</head>

<body>

    <!-- SPLASH -->

    <div id="splash">

        <div class="brandMark brandMarkLarge" aria-hidden="true">
            <i data-lucide="box"></i>
        </div>

        <h1>PrimeDocs</h1>

        <p>PrimeLine 3D</p>

    </div>



    <!-- APP -->

    <div id="app">

        <div id="drawerOverlay" class="drawerOverlay" onclick="fecharDrawerPrimeDocs()"></div>
        <aside id="appDrawer" class="appDrawer" aria-hidden="true"><div id="drawerNavigation"></div></aside>

        <!-- HEADER -->

        <header class="appHeader">

            <button class="headerIconButton menuTrigger" type="button" onclick="alternarDrawerPrimeDocs()" aria-label="Abrir menu"><i data-lucide="menu"></i></button>

            <div class="headerBrand">
                <div id="headerCompanyLogo" class="brandMark" aria-hidden="true">
                    <i data-lucide="box"></i>
                </div>
                <div>
                    <h1 id="headerCompanyName">PrimeLine 3D</h1>
                    <span id="headerGreeting">PrimeDocs</span>
                </div>
            </div>

            <div class="headerActions">
                <button class="headerIconButton notificationButton" type="button" onclick="abrirCentralNotificacoes()" aria-label="Notificações" title="Notificações"><i data-lucide="bell"></i><span class="notificationDot"></span></button>
                <button
                    id="themeToggle"
                    class="themeToggle"
                    type="button"
                    onclick="alternarTemaPrimeDocs()"
                    aria-label="Alternar tema claro e escuro"
                    title="Alternar tema">
                    <i class="themeIconSun" data-lucide="sun"></i>
                    <i class="themeIconMoon" data-lucide="moon"></i>
                </button>
            </div>

        </header>



        <!-- CONTEÚDO -->

        <main id="content">

        </main>

    </div>



    <!-- jsPDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- html2canvas -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

  <script src="js/config/app.js?v=4"></script>
<script src="js/config/categorias.js?v=4"></script>
<script src="js/config/menu.js?v=7"></script>
<script src="js/config/status.js?v=7"></script>

<script src="js/storage.js?v=12"></script>
<script src="js/utils.js?v=4"></script>
<script src="js/financeiro.js?v=12"></script>
<script src="js/calculadoraCustos.js?v=7"></script>

<script src="js/components/card.js?v=4"></script>
<script src="js/components/button.js?v=4"></script>
<script src="js/components/input.js?v=4"></script>
<script src="js/components/modal.js?v=4"></script>
<script src="js/components/page.js?v=4"></script>
<script src="js/components/toast.js?v=4"></script>
<script src="js/components/navigation.js?v=12"></script>

<script src="js/pdf.js?v=6"></script>

<script src="js/router.js?v=12"></script>

<script src="pages/home.js?v=12"></script>
<script src="pages/produtos.js?v=4"></script>
<script src="pages/consignado.js?v=4"></script>
<script src="pages/lojas.js?v=11"></script>
<script src="pages/conferencia.js?v=12"></script>
<script src="pages/configuracoes.js?v=12"></script>
<script src="pages/orcamento.js?v=11"></script>
<script src="pages/filamentos.js?v=7"></script>
<script src="pages/custos.js?v=7"></script>
<script src="pages/pedidos.js?v=12"></script>
<script src="pages/clientes.js?v=12"></script>
<script src="pages/relatorios.js?v=11"></script>
<script src="pages/financeiro.js?v=12"></script>

<script src="js/app.js?v=12"></script>
</body>

</html>
